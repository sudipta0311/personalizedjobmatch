name: Weekly Discovery

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      profile_path:
        description: "Path to profile.yaml (default: profile.yaml)"
        required: false
        default: "profile.yaml"

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run discovery workflow
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEON_DATABASE_URL:    ${{ secrets.NEON_DATABASE_URL }}
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          # Non-secret tuning — set as repo Variables (Settings → Variables), optional
          JOB_PREFERENCES:      ${{ vars.JOB_PREFERENCES }}
          LINKEDIN_URL:         ${{ vars.LINKEDIN_URL }}
          DIGEST_TOP_N:         ${{ vars.DIGEST_TOP_N }}
          MAX_JOBS_PER_RUN:     ${{ vars.MAX_JOBS_PER_RUN }}
        run: python scripts/run_discover.py
