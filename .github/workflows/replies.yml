name: Reply Poller

on:
  schedule:
    # Every 8 hours: 07:00, 15:00, 23:00 UTC
    - cron: "0 7,15,23 * * *"
  workflow_dispatch: {}

jobs:
  poll-replies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reply poller
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEON_DATABASE_URL:    ${{ secrets.NEON_DATABASE_URL }}
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          # Non-secret tuning — set as repo Variables (Settings → Variables), optional
          JOB_PREFERENCES:      ${{ vars.JOB_PREFERENCES }}
          LINKEDIN_URL:         ${{ vars.LINKEDIN_URL }}
        run: python scripts/run_replies.py
