# ---------------------------------------------------------------------------
# LETTER STYLE — guides the LLM when writing cover letters and outreach
# ---------------------------------------------------------------------------
letter_style:
  tone: "confident and direct — not sycophantic, not over-eager"
  length: "3 paragraphs, under 350 words"
  avoid_phrases:
    - "I am writing to express my interest in"
    - "I would be a great fit"
    - "thrilled and excited"
    - "passionate about"
    - "dynamic team"
  voice_notes: >
    First person, active voice. Open with what I can deliver for THEM, not
    what the role offers me. Acknowledge gaps honestly and briefly — one sentence
    maximum. Reference specific technologies or business challenges from the JD.
    Close with a concrete next step, not platitudes. No more than 3 paragraphs.

# ---------------------------------------------------------------------------
# PREFERENCES — used in form answers and scheduling context
# ---------------------------------------------------------------------------
notice_period: "1 month"
relocation_open: true
remote_preference: "hybrid or fully remote"

salary_expectation:
  eu_eur: 120000      # annual gross, EUR
  india_inr: 5000000  # annual gross, INR
  gcc_usd: 150000     # annual gross, USD (tax-free in most GCC states)
  note: "These are targets; the agent never surfaces exact figures unless asked."
