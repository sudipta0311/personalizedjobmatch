# ---------------------------------------------------------------------------
# DISCOVERY — sources and search parameters
# Greenhouse is the only live source (Lever is a stub). Replace the boards below
# with the Greenhouse slugs of companies that hire architects in YOUR markets.
# Find the slug in a company's careers URL: boards.greenhouse.io/<slug>
# VERIFY each slug resolves (a 404 in the log means the slug is wrong/not on Greenhouse).
# ---------------------------------------------------------------------------
discovery:
  sources:
    greenhouse:
      enabled: true
      boards:
        # ↓↓↓ EXAMPLES — verify each one and swap for your real EU/India/Gulf targets ↓↓↓
        - "celonis"          # process intelligence (DE/EU, hires architects)
        - "contentful"       # Berlin
        - "personio"         # Munich
        - "wise"             # London/EU
        - "adyen"            # Amsterdam
        # Add: Nordic/EU consultancies, telcos, banks, and product firms on Greenhouse.
        # Verify each slug loads at boards.greenhouse.io/<slug> before relying on it.
      fetch_all: true

    lever:
      enabled: false         # still a stub in the codebase — leave off until implemented
      companies: []

    career_pages:
      enabled: false
      pages: []

  search_keywords:
    - "solution architect"
    - "enterprise architect"
    - "AI architect"
    - "agentic"
    - "LLM"
    - "RAG"
    - "machine learning architect"
    - "cloud architect"
    - "platform architect"
    - "head of architecture"

  preferred_locations:
    - "Denmark"
    - "Netherlands"
    - "Germany"
    - "Sweden"
    - "India"
    - "UAE"
    - "Saudi Arabia"
    - "Remote"
    - "Europe"

  remote_ok: true
  max_age_days: 30

# ---------------------------------------------------------------------------
# SCORING
# ---------------------------------------------------------------------------
scoring:
  composite_weights:
    llm_fit: 0.60
    auth_fit: 0.20
    grade_fit: 0.20
  cutoff_score: 55           # slightly lower than default 60 while you tune; raise once matches flow
  top_n_digest: 10
  hard_veto_on_auth:
    - "not_authorised"

# ---------------------------------------------------------------------------
# MODELS — per-node LLM selection. provider: openai | anthropic
# ---------------------------------------------------------------------------
models:
  scoring:
    provider: openai
    model: gpt-4o-mini
  tailoring:
    provider: openai
    model: gpt-4o
  outreach:
    provider: openai
