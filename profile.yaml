# profile.yaml — master profile for the job-search agent
# This file is the ONLY source of truth for CV content, preferences, and filters.
# The agent reads this and never fabricates — it only reorders/emphasises what is here.
# SECURITY: Never commit this file with real personal data to a public repo.
# Populate every section; delete the placeholder comments when you fill them in.

# ---------------------------------------------------------------------------
# PERSONAL CONTACT
# ---------------------------------------------------------------------------
personal:
  name: "Sudipta Sarkar"
  email: "sudipta0311@gmail.com"
  phone: "+45 91 62 90 54"
  location: "Copenhagen, Denmark"
  linkedin_url: "https://www.linkedin.com/in/sudipta-sarkar-73aaa85/"   # profile URL only — never automated
  github_url: "https://github.com/yourusername"
  website: ""  # optional personal site / portfolio

# ---------------------------------------------------------------------------
# SENIORITY — used by rule gates to flag grade mismatches
# ---------------------------------------------------------------------------
seniority:
  level: "senior"       # junior | mid | senior | principal | director
  years_experience: 15
  min_years_in_jd: 8    # flag roles requiring fewer years (overqualified risk)
  max_years_in_jd: 20   # flag roles requiring significantly more (out-of-reach risk)

# ---------------------------------------------------------------------------
# TARGET — what the agent should chase; what to skip
# ---------------------------------------------------------------------------
target:
  titles:
    - "Senior AI Architect"
    - "Principal AI Architect"
    - "Enterprise AI Architect"
    - "Head of AI"
    - "AI Platform Lead"
    - "Staff AI Engineer"
  exclude_title_substrings:   # skip if job title contains any of these (case-insensitive)
    - "Junior"
    - "Graduate"
    - "Intern"
    - "VP of Engineering"     # exclude pure executive titles
    - "Chief People"
  exclude_companies: []       # company names to always skip (exact or substring match)
  exclude_domains: []         # e.g. ["gambling", "crypto"] — checked against JD text

# ---------------------------------------------------------------------------
# MARKET FRAMINGS
# CV headline and positioning line are swapped per market tag.
# The agent picks the framing that matches the role's market_tag.
# ---------------------------------------------------------------------------
market_framings:
  eu:
    positioning: >
      Senior AI and enterprise architect with 15+ years designing agentic systems,
      RAG pipelines, and cloud-native data platforms across European enterprises.
    cv_headline: "Senior AI & Enterprise Architect | Agentic AI · RAG · Azure/AWS/GCP"
    keywords_emphasis:
      - "LLM orchestration"
      - "agentic AI"
      - "RAG"
      - "LangChain"
      - "LangGraph"
      - "Azure"
      - "Databricks"
      - "enterprise architecture"

  india:
    positioning: >
      Returning senior AI architect with 15+ years of global enterprise experience,
      specialising in agentic systems, cloud-native AI platforms, and centre-of-excellence build-outs.
    cv_headline: "Senior AI & Enterprise Architect | Agentic AI · RAG · Cloud · Digital Transformation"
    keywords_emphasis:
      - "digital transformation"
      - "center of excellence"
      - "AI/ML platform"
      - "cloud adoption"
      - "stakeholder management"

  gcc:
    positioning: >
      Senior AI and enterprise architect delivering large-scale digital transformation and
      intelligent automation for government and enterprise clients across the Gulf.
    cv_headline: "Senior AI & Enterprise Architect | Digital Transformation · Agentic AI · Cloud"
    keywords_emphasis:
      - "digital transformation"
      - "intelligent automation"
      - "enterprise architecture"
      - "Vision 2030"
      - "government AI"
      - "smart city"

# ---------------------------------------------------------------------------
# WORK AUTHORISATION — per ISO 3166-1 alpha-2 country code
# Values: authorised | blue_card_eligible | citizen | needs_visa |
#         needs_licensed_sponsor | not_authorised | unknown
# The rule gate maps the role's country to this table.
# ---------------------------------------------------------------------------
work_authorisation:
  DK: "authorised"             # Danish work permit / residency
  NL: "blue_card_eligible"     # EU Blue Card / Highly Skilled Migrant
  DE: "blue_card_eligible"
  SE: "blue_card_eligible"
  BE: "blue_card_eligible"
  FR: "blue_card_eligible"
  FI: "blue_card_eligible"
  NO: "needs_visa"             # Norway — not EU, check separately
  IN: "citizen"
  AE: "needs_visa"             # UAE — employer sponsors visa
  SA: "needs_visa"
  QA: "needs_visa"
  BH: "needs_visa"
  KW: "needs_visa"
  OM: "needs_visa"
  GB: "needs_licensed_sponsor" # UK — Skilled Worker, must be licensed sponsor → always flag
  US: "not_authorised"         # no current US work authorisation
  CA: "not_authorised"
  AU: "not_authorised"
  default: "unknown"           # fall-through for unlisted countries

# ---------------------------------------------------------------------------
# DISCOVERY — sources and search parameters
# ---------------------------------------------------------------------------
discovery:
  sources:
    greenhouse:
      enabled: true
      # List the Greenhouse board slugs for companies you want to monitor.
      # Find the slug in a company's Greenhouse URL: jobs.greenhouse.io/<slug>
      boards:
        - "anthropic"         # example — replace with real targets
        - "databricks"
        - "palantir"
      # Optional: fetch ALL jobs from a board (true) or filter by keyword (false).
      # When true, the agent fetches every job and filters client-side.
      fetch_all: true

    lever:
      enabled: false          # enable in Phase 2+
      companies: []           # Lever site slugs

    career_pages:
      enabled: false          # enable in Phase 2+
      pages: []               # list of {company: str, url: str} dicts

  search_keywords:            # title/description filter applied client-side
    - "AI architect"
    - "enterprise architect"
    - "agentic"
    - "LLM"
    - "head of AI"
    - "machine learning architect"
    - "data architect"

  preferred_locations:        # soft preference — stored as market_tag metadata
    - "Netherlands"
    - "Denmark"
    - "Germany"
    - "India"
    - "UAE"
    - "Remote"
    - "Europe"

  remote_ok: true
  max_age_days: 30            # ignore postings older than this

# ---------------------------------------------------------------------------
# SCORING
# ---------------------------------------------------------------------------
scoring:
  composite_weights:
    llm_fit: 0.60
    auth_fit: 0.20
    grade_fit: 0.20
  cutoff_score: 60            # drop roles below this composite score
  top_n_digest: 10            # max roles to include in the weekly digest
  hard_veto_on_auth:          # these auth statuses are hard veto (role not shown)
    - "not_authorised"

# ---------------------------------------------------------------------------
# MODELS — per-node LLM selection. Provider-agnostic: OpenAI is the default,
# set provider: anthropic on any node to use Claude instead.
#   provider: openai | anthropic
#   model:    e.g. gpt-4o-mini, gpt-4o, claude-sonnet-4-6, claude-opus-4-8
# ---------------------------------------------------------------------------
models:
  scoring:                          # LLM semantic fit (high volume)
    provider: openai
    model: gpt-4o-mini
  tailoring:                        # CV / cover letter (Phase 5)
    provider: anthropic
    model: claude-opus-4-8
  outreach:                         # LinkedIn outreach drafts (Phase 5)
    provider: anthropic
    model: claude-opus-4-8

