# ---------------------------------------------------------------------------
# LETTER STYLE — guides the LLM when writing cover letters and outreach
# ---------------------------------------------------------------------------
letter_style:
  tone: "confident and direct — not sycophantic, not over-eager"
  length: "3-4 paragraphs, under 350 words"
  avoid_phrases:
    - "I am writing to express my interest in"
    - "I would be a great fit"
    - "thrilled and excited"
    - "passionate about"
    - "dynamic team"
  voice_notes: >
    First person, active voice. Open with what I can deliver for THEM, not what the
    role offers me. Lead with the strongest genuine match. Acknowledge any real gap
    honestly and briefly in one confident sentence — never apologetic. Reference
    specific technologies or business challenges from the JD. Close with a concrete
    next step. For India roles, signal Indian citizenship and India-market comp
    alignment; for EU roles, signal work authorisation (Danish permit / Blue-Card
    eligible) where relevant.

